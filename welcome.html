<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Peomo Study Timer</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>

body{
margin:0;

font-family: 'Press Start 2P',cursive;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background-image:url("welcome.jpeg");
background-size:cover;
background-position: center;
background-repeat: no-repeat;
color:white;
text-align:center;
}


.container{
background:rgba(0,0,0,0.3);
padding:40px;
border-radius:15px;
width:90%;
max-width:500px;
}

h1{
font-size:40px;

margin-bottom:10px;
}

p{
font-size:18px;
font-family:Arial;
margin-bottom:30px;
}

button{
padding:15px 30px;
font-size:18px;
border:none;
border-radius:10px;
background:white;
color:#ff3d3d;
cursor:pointer;
}

button:hover{
background:#fdfbfb;
}

@media(max-width:600px){

h1{
font-size:30px;
}

button{
width:100%;
}

}

</style>
</head>

<body>

<div class="container">

<h1>🍅 Welcome</h1>

<h2>Welcome to Peomo Study Timer</h2>

<p>
Focus better, study smarter, and manage your time with the Pomodoro technique.
</p>

<button onclick="startTimer()">
Start Studying
</button>

</div>

<script>

function startTimer(){

window.location.href="index.html";

}

</script>

</body>
</html>

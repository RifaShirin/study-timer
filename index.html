<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pomodoro Study Timer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Background Image Input -->
<input type="file" id="bgInput" accept="image/*" hidden>

<div class="main-wrapper">
<div class="container">
    <h1>🍅 Pomodoro Timer</h1>

    <div id="timer">25:00</div>
    <p id="status">Focus Time</p>

    <div class="buttons">
        <button onclick="startTimer()">Start</button>
        <button onclick="pauseTimer()">Pause</button>
        <button onclick="resetTimer()">Reset</button>
    </div>
    <button class="bg-btn" onclick="openBgChooser()">Change Background</button>


    <!-- Toggle Notes Button -->
    <button class="notes-toggle" onclick="toggleNotes()">📒 Notes</button>

    
    
</div>

<!-- Notes Section (Hidden by Default) -->
<div id="notesSection" class="notes-section" style="display:none;">
    <input type="file" id="noteFile" accept=".txt,.pdf,image/*">
    <textarea id="noteText" placeholder="Write your notes here..."></textarea>
    <iframe id="filePreview"></iframe>
</div>
</div>
    </div>
<div id="notification" class="notification"></div>

<audio id="alertSound">
<source src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg" type="audio/ogg">
</audio>

<script src="script.js"></script>
</body>
</html>
